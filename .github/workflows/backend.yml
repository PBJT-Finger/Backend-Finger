name: Backend-Finger Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'prisma/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/finger-backend

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===== JOB 1: LINT + FORMAT CHECK =====
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Check Prettier formatting
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

  # ===== JOB 2: BUILD & PUSH IMAGE =====
  build:
    name: Build & Push Image
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image name (lowercase)
        id: image
        run: echo "name=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=main-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # ===== JOB 3: DEPLOY TO PRODUCTION =====
  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15
    concurrency:
      group: production-backend-deploy
      cancel-in-progress: false

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Wait for Tailscale routing
        run: sleep 3

      - name: Add SSH known host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # ── Preflight ──────────────────────────────────────────
      - name: Preflight checks
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/fingerback' }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: DEPLOY_PATH
          script: |
            set -e
            echo "📋 Preflight — $DEPLOY_PATH"
            [ -d "$DEPLOY_PATH" ] || { echo "❌ Deploy dir not found"; exit 1; }
            cd "$DEPLOY_PATH"
            [ -f .env.docker ] || { echo "❌ .env.docker not found"; exit 1; }
            docker info > /dev/null 2>&1 || { echo "❌ Docker daemon down"; exit 1; }
            docker compose config > /dev/null 2>&1 || { echo "❌ Compose config invalid"; exit 1; }
            if docker compose ps finger-mysql 2>/dev/null | grep -q "healthy"; then
              echo "✅ MySQL healthy"
            else
              echo "⚠️ MySQL not healthy or not running (first deploy?)"
            fi
            echo "✅ Preflight passed"

      # ── Deploy ────────────────────────────────────────────
      - name: Deploy backend
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/fingerback' }}
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME || github.repository_owner }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: DEPLOY_PATH,IMAGE_TAG,REGISTRY,IMAGE_NAME,GHCR_PAT,GHCR_USER
          script: |
            set -e
            cd "$DEPLOY_PATH"

            # GHCR login
            if [ -n "$GHCR_PAT" ]; then
              echo "$GHCR_PAT" | docker login "$REGISTRY" -u "$GHCR_USER" --password-stdin
            fi

            # Capture current tag for rollback
            CURRENT_IMAGE=$(docker inspect finger-backend --format='{{.Config.Image}}' 2>/dev/null || echo "none")
            echo "📌 Current: $CURRENT_IMAGE"
            echo "📌 Deploying: $IMAGE_TAG"

            # Pull new image
            export BACKEND_IMAGE="${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
            docker pull "$BACKEND_IMAGE"

            # Run migrations (idempotent)
            docker compose run --rm \
              -e DATABASE_URL \
              finger-backend \
              npx prisma migrate deploy

            # Rolling update — stop old, start new (minimal downtime)
            docker compose up -d --no-deps --force-recreate finger-backend

            # Wait for health
            echo "⏳ Waiting for health check..."
            for i in $(seq 1 20); do
              if curl -sf http://localhost:3333/health > /dev/null; then
                echo "✅ Backend healthy after ${i}x3s"
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "❌ Health check timeout — rolling back to $CURRENT_IMAGE"
                docker pull "$CURRENT_IMAGE" || true
                BACKEND_IMAGE="$CURRENT_IMAGE" docker compose up -d --no-deps finger-backend
                exit 1
              fi
              sleep 3
            done

            # Cleanup old images (keep last 5)
            docker images "$(echo ${REGISTRY}/${IMAGE_NAME} | tr '[:upper:]' '[:lower:]')" \
              --format "{{.Tag}}" | \
              grep "^main-" | sort -r | tail -n +6 | \
              xargs -r -I {} docker rmi "$(echo ${REGISTRY}/${IMAGE_NAME} | tr '[:upper:]' '[:lower:]'):{}}" || true
            docker image prune -f || true

            echo "🎉 Backend deployed: $IMAGE_TAG"

      - name: Deployment summary
        run: |
          echo "### 🚀 Backend Deployed" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image-tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ needs.build.outputs.image-digest }}\`" >> $GITHUB_STEP_SUMMARY

# REQUIRED SECRETS:
# - SSH_HOST          : Production server IP/hostname
# - SSH_USER          : SSH username
# - SSH_PRIVATE_KEY   : SSH private key (full content)
# - SSH_PORT          : SSH port (optional, default: 22)
# - DEPLOY_PATH       : Deploy directory (optional, default: /opt/finger-app)
# - TAILSCALE_AUTHKEY : Tailscale auth key
# - GHCR_PAT          : GHCR Personal Access Token (optional, public images)
# - GHCR_USERNAME     : GHCR username (optional)
