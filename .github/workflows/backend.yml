name: Backend-Finger CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - '.github/workflows/backend.yml'
      - 'public/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'prisma/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/finger-backend

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===== JOB 1: BUILD & PUSH IMAGE =====
  build:
    name: Build & Push Image
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image name (lowercase)
        id: image
        run: echo "name=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=main-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # ===== JOB 3: DEPLOY TO PRODUCTION =====
  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    timeout-minutes: 15
    concurrency:
      group: production-backend-deploy
      cancel-in-progress: false

    steps:
      # ── Tailscale ──────────────────────────────────────────────
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          if echo "$SSH_PRIVATE_KEY" | grep -q '^LS0tLS1CRUdJTi'; then
            echo "🔑 Decoding base64 SSH key..."
            echo "$SSH_PRIVATE_KEY" | base64 --decode > ~/.ssh/deploy_key
          else
            echo "🔑 Using plain PEM SSH key..."
            echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
            echo "" >> ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null \
            && echo "✅ Key valid: $(ssh-keygen -l -f ~/.ssh/deploy_key | awk '{print $2}')" \
            || { echo "❌ Key parse failed"; exit 1; }

      - name: Add SSH known host
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          : "${SSH_HOST:?❌ Secret SSH_HOST is not set!}"
          mkdir -p ~/.ssh
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || {
            echo "❌ ssh-keyscan failed — host unreachable or port closed"
            exit 1
          }
          chmod 644 ~/.ssh/known_hosts
          echo "✅ SSH known host added"

      - name: Checkout
        uses: actions/checkout@v4

      # ── Preflight ──────────────────────────────────────────────
      - name: Preflight checks
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          # Fail loudly if any required secret is missing
          : "${DEPLOY_PATH:?❌ Secret DEPLOY_PATH is not set!}"
          : "${DB_PASSWORD:?❌ Secret DB_PASSWORD is not set!}"
          : "${DB_NAME:?❌ Secret DB_NAME is not set!}"
          : "${SSH_PORT:?❌ Secret SSH_PORT is not set!}"

          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            -p "${SSH_PORT}" \
            "${SSH_USER}@${SSH_HOST}" \
            "set -e
             DEPLOY_PATH='${DEPLOY_PATH}'
             DB_PASSWORD='${DB_PASSWORD}'
             DB_NAME='${DB_NAME}'
             echo '🔍 Preflight checks started...'

             [ -d \"\$DEPLOY_PATH\" ] || { echo '❌ Deploy dir not found: '\$DEPLOY_PATH; exit 1; }
             cd \"\$DEPLOY_PATH\"

             echo '🔐 Generating .env.docker...'
             echo \"DATABASE_URL=mysql://root:\${DB_PASSWORD}@mysql:3306/\${DB_NAME}\" > .env.docker
             echo \"DB_PASSWORD=\${DB_PASSWORD}\" >> .env.docker
             echo \"DB_NAME=\${DB_NAME}\" >> .env.docker
             echo \"DB_USERNAME=root\" >> .env.docker
             echo \"DB_HOST=mysql\" >> .env.docker
             echo \"REDIS_HOST=redis\" >> .env.docker
             echo '✅ .env.docker generated'

             docker info > /dev/null 2>&1 || { echo '❌ Docker daemon not running!'; exit 1; }
             echo '✅ All preflight checks passed!'"

      # ── Deploy ────────────────────────────────────────────────
      - name: Deploy backend
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          FINGERPRINT_IP: ${{ secrets.FINGERPRINT_IP }}
          TZ: ${{ secrets.TZ }}
          POLLING_INTERVAL_MS: ${{ secrets.POLLING_INTERVAL_MS }}
          RECONNECT_DELAY_MS: ${{ secrets.RECONNECT_DELAY_MS }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          # Fail loudly if any critical secret is missing
          : "${DEPLOY_PATH:?❌ Secret DEPLOY_PATH is not set!}"
          : "${FINGERPRINT_IP:?❌ Secret FINGERPRINT_IP is not set!}"
          : "${DB_PASSWORD:?❌ Secret DB_PASSWORD is not set!}"
          : "${DB_NAME:?❌ Secret DB_NAME is not set!}"
          : "${REDIS_PASSWORD:?❌ Secret REDIS_PASSWORD is not set!}"
          : "${SSH_PORT:?❌ Secret SSH_PORT is not set!}"

          IMG_REPO=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          BACKEND_IMAGE="${IMG_REPO}:${IMAGE_TAG}"

          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            -p "${SSH_PORT}" \
            "${SSH_USER}@${SSH_HOST}" \
            "set -e
             DEPLOY_PATH='${DEPLOY_PATH}'
             BACKEND_IMAGE='${BACKEND_IMAGE}'
             GHCR_PAT='${GHCR_PAT}'
             GHCR_USER='${GHCR_USER}'
             IMG_REPO='${IMG_REPO}'
             IMAGE_TAG='${IMAGE_TAG}'
             DB_PASSWORD='${DB_PASSWORD}'
             DB_NAME='${DB_NAME}'
             REDIS_PASSWORD='${REDIS_PASSWORD}'
             JWT_ACCESS_SECRET='${JWT_ACCESS_SECRET}'
             JWT_REFRESH_SECRET='${JWT_REFRESH_SECRET}'
             API_KEY_SECRET='${API_KEY_SECRET}'
             FINGERPRINT_IP='${FINGERPRINT_IP}'
             TZ='${TZ:-Asia/Jakarta}'
             POLLING_INTERVAL_MS='${POLLING_INTERVAL_MS:-30000}'
             RECONNECT_DELAY_MS='${RECONNECT_DELAY_MS:-30000}'

             cd \"\$DEPLOY_PATH\"

             if [ -n \"\$GHCR_PAT\" ]; then
               echo '🔐 Logging into GHCR...'
               echo \"\$GHCR_PAT\" | docker login ghcr.io -u \"\$GHCR_USER\" --password-stdin
             fi

             echo \"📦 Deploying: \$BACKEND_IMAGE\"

             echo '🗄️ Running database migrations...'
             docker run --rm --network finger-net \
               -e DATABASE_URL=\"\$(grep '^DATABASE_URL=' .env.docker | cut -d= -f2-)\" \
               \"\$BACKEND_IMAGE\" npx prisma migrate deploy \
               && echo '✅ Migrations complete' \
               || { echo '❌ Migration failed!'; exit 1; }

             echo '🚀 Updating swarm service finger-be_redis...'
             docker service update finger-be_redis \
               --args \"redis-server --appendonly yes --requirepass \${REDIS_PASSWORD}\" \
               || echo '⚠️ Warning: Failed to update redis service'

             echo '🚀 Updating swarm service finger-be_backend...'
             docker service update --image \"\$BACKEND_IMAGE\" \
               --env-add PORT=3333 \
               --env-add TZ=\"\$TZ\" \
               --env-add JWT_ACCESS_SECRET=\"\$JWT_ACCESS_SECRET\" \
               --env-add JWT_REFRESH_SECRET=\"\$JWT_REFRESH_SECRET\" \
               --env-add API_KEY_SECRET=\"\$API_KEY_SECRET\" \
               --env-add REDIS_PASSWORD=\"\$REDIS_PASSWORD\" \
               --env-add DB_PASSWORD=\"\$DB_PASSWORD\" \
               --env-add DB_NAME=\"\$DB_NAME\" \
               --env-add DATABASE_URL=\"mysql://root:\${DB_PASSWORD}@mysql:3306/\${DB_NAME}\" \
               --env-add FINGERPRINT_IP=\"\$FINGERPRINT_IP\" \
               --env-add POLLING_INTERVAL_MS=\"\$POLLING_INTERVAL_MS\" \
               --env-add RECONNECT_DELAY_MS=\"\$RECONNECT_DELAY_MS\" \
               --health-cmd \"wget -qO- http://127.0.0.1:3333/health || exit 1\" \
               --with-registry-auth finger-be_backend

             echo '✅ Service update stabilized and converged successfully!'

             docker images \"\$IMG_REPO\" --format '{{.Tag}}' | grep '^main-' | sort -r | tail -n +6 | \
               xargs -r -I {} docker rmi \"\${IMG_REPO}:{}\" || true
             docker image prune -f || true

             echo \"🎉 Deployed: \$BACKEND_IMAGE\""

      - name: Deployment summary
        if: always()
        run: |
          echo "### 🚀 Backend-Finger Deploy" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]'):${{ needs.build.outputs.image-tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

# REQUIRED SECRETS (GitHub → Settings → Secrets and variables → Actions):
# ─── Infrastruktur ───────────────────────────────────────────────────────────
# - SSH_HOST             : Tailscale IP server (contoh: 100.72.45.110)
# - SSH_USER             : username SSH (contoh: deploy)
# - SSH_PORT             : port SSH (contoh: 22)
# - SSH_PRIVATE_KEY      : isi penuh private key (termasuk baris BEGIN/END)
# - DEPLOY_PATH          : path deploy di server (contoh: /opt/finger-be)
# - TAILSCALE_AUTHKEY    : Reusable ephemeral key (tanpa tag)
# ─── Registry ────────────────────────────────────────────────────────────────
# - GHCR_PAT             : GitHub PAT dengan scope read:packages
# - GHCR_USERNAME        : GitHub username pemilik package
# ─── Database ────────────────────────────────────────────────────────────────
# - DB_PASSWORD          : password MySQL
# - DB_NAME              : nama database (contoh: finger_db)
# ─── Aplikasi ────────────────────────────────────────────────────────────────
# - JWT_ACCESS_SECRET    : secret untuk access token
# - JWT_REFRESH_SECRET   : secret untuk refresh token
# - API_KEY_SECRET       : secret untuk API key
# ─── Perangkat Fingerprint ───────────────────────────────────────────────────
# - FINGERPRINT_IP       : IP pintu depan Router Biru (contoh: 172.17.40.214)
# - POLLING_INTERVAL_MS  : interval polling ZKTeco dalam ms (contoh: 30000)
# - RECONNECT_DELAY_MS   : delay reconnect dalam ms (contoh: 30000)
# ─── Sistem ──────────────────────────────────────────────────────────────────
# - TZ                   : timezone server (contoh: Asia/Jakarta)
# Trigger CI/CD
