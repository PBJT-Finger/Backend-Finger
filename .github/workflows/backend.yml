name: Backend-Finger CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'prisma/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/finger-backend

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===== JOB 1: LINT + FORMAT CHECK =====
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Check Prettier formatting
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

  # ===== JOB 2: BUILD & PUSH IMAGE =====
  build:
    name: Build & Push Image
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image name (lowercase)
        id: image
        run: echo "name=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=main-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # ===== JOB 3: DEPLOY TO PRODUCTION =====
  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    timeout-minutes: 15
    concurrency:
      group: production-backend-deploy
      cancel-in-progress: false

    steps:
      # ── Tailscale (no tags → admin-owned node → autogroup:admin) ──
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          # Check if the key is base64 encoded (starts with 'LS0tLS1CRUdJTi')
          if echo "$SSH_PRIVATE_KEY" | grep -q '^LS0tLS1CRUdJTi'; then
            echo "🔑 Decoding base64 SSH key..."
            echo "$SSH_PRIVATE_KEY" | base64 --decode > ~/.ssh/deploy_key
          else
            echo "🔑 Using plain PEM SSH key..."
            # Clean up Windows CRLF (\r) and ensure trailing newline
            echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
            echo "" >> ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null \
            && echo "✅ Key valid: $(ssh-keygen -l -f ~/.ssh/deploy_key | awk '{print $2}')" \
            || { echo "❌ Key parse failed (Check if you copied the full key including BEGIN/END lines without extra spaces!)"; exit 1; }

      - name: Add SSH known host
        run: |
          echo "🔍 Adding SSH known host..."
          if [ -z "$SSH_HOST" ]; then
            echo "❌ SSH_HOST secret is empty!"
            exit 1
          fi
          mkdir -p ~/.ssh
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || {
            echo "❌ ssh-keyscan failed — host unreachable or port closed"
            exit 1
          }
          chmod 644 ~/.ssh/known_hosts
          echo "✅ SSH known host added"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}

      - name: Checkout (for docker-compose.yml sync)
        uses: actions/checkout@v4

      # ── Skip Compose Sync for Swarm ────────────────────────────
      - name: Skip compose sync for Swarm
        run: echo "Swarm stack is managed externally. Skipping compose file sync."

      # ── Preflight ──────────────────────────────────────────────
      - name: Preflight checks
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/finger-be' }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            -p "${{ secrets.SSH_PORT || 22 }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "set -e
             DEPLOY_PATH='${DEPLOY_PATH}'
             DB_PASSWORD='${DB_PASSWORD}'
             DB_NAME='finger_db'
             echo '🔍 Preflight checks started...'

             [ -d \"\$DEPLOY_PATH\" ] || { echo '❌ Deploy dir not found: '\$DEPLOY_PATH; exit 1; }
             cd \"\$DEPLOY_PATH\"

             # Generate .env.docker using GitHub Secrets
             echo '🔐 Generating .env.docker...'
             echo \"DATABASE_URL=mysql://root:\${DB_PASSWORD}@mysql:3306/\${DB_NAME}\" > .env.docker
             echo \"DB_PASSWORD=\${DB_PASSWORD}\" >> .env.docker
             echo \"DB_NAME=\${DB_NAME}\" >> .env.docker
             echo \"DB_USERNAME=root\" >> .env.docker
             echo \"DB_HOST=mysql\" >> .env.docker
             echo \"REDIS_HOST=redis\" >> .env.docker
             echo '✅ .env.docker generated successfully'

             echo '🐳 Checking Docker daemon...'
             docker info > /dev/null 2>&1 || { echo '❌ Docker daemon not running!'; exit 1; }
             echo '✅ Docker daemon running'

             echo '✅ All preflight checks passed!'"

      # ── Deploy ────────────────────────────────────────────────
      - name: Deploy backend
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/finger-be' }}
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME || github.repository_owner }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
        run: |
          IMG_REPO=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          BACKEND_IMAGE="${IMG_REPO}:${IMAGE_TAG}"

          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            -p "${{ secrets.SSH_PORT || 22 }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "set -e
             DEPLOY_PATH='${DEPLOY_PATH}'
             BACKEND_IMAGE='${BACKEND_IMAGE}'
             GHCR_PAT='${GHCR_PAT}'
             GHCR_USER='${GHCR_USER}'
             IMG_REPO='${IMG_REPO}'
             IMAGE_TAG='${IMAGE_TAG}'
             DB_PASSWORD='${DB_PASSWORD}'
             JWT_ACCESS_SECRET='${JWT_ACCESS_SECRET}'
             JWT_REFRESH_SECRET='${JWT_REFRESH_SECRET}'
             DB_NAME='finger_db'

             cd \"\$DEPLOY_PATH\"

             # GHCR login
             if [ -n \"\$GHCR_PAT\" ]; then
               echo '🔐 Logging into GHCR...'
               echo \"\$GHCR_PAT\" | docker login ghcr.io -u \"\$GHCR_USER\" --password-stdin
             fi

             echo \"📦 Deploying: \$BACKEND_IMAGE\"

             # Run migrations ONCE using a temporary container on the swarm network
             echo '🗄️ Running database migrations...'
             docker run --rm --network finger-net \
               -e DATABASE_URL=\"\$(grep '^DATABASE_URL=' .env.docker | cut -d= -f2-)\" \
               \"\$BACKEND_IMAGE\" npx prisma migrate deploy \
               && echo '✅ Migrations complete' \
               || { echo '❌ Migration failed!'; exit 1; }

             # Update Docker Swarm service
             # Asumsi nama stack backend adalah finger-be
             echo '🚀 Updating swarm service finger-be_backend...'
             docker service update --image \"\$BACKEND_IMAGE\" \
               --env-add JWT_ACCESS_SECRET=\"\$JWT_ACCESS_SECRET\" \
               --env-add JWT_REFRESH_SECRET=\"\$JWT_REFRESH_SECRET\" \
               --with-registry-auth finger-be_backend

             # Verify deployment status
             echo '⏳ Waiting for service update to stabilize...'
             docker service rollout status finger-be_backend

             # Cleanup old images (keep last 5)
             docker images \"\$IMG_REPO\" --format '{{.Tag}}' | grep '^main-' | sort -r | tail -n +6 | \
               xargs -r -I {} docker rmi \"\${IMG_REPO}:{}\" || true
             docker image prune -f || true

             echo \"🎉 Deployed: \$BACKEND_IMAGE\""

      - name: Deployment summary
        if: always()
        run: |
          echo "### 🚀 Backend-Finger Deploy" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]'):${{ needs.build.outputs.image-tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

# REQUIRED SECRETS:
# - SSH_HOST          : Tailscale IP server (100.72.45.110)
# - SSH_USER          : deploy
# - SSH_PRIVATE_KEY   : Private key finger_back (full content)
# - SSH_PORT          : 22 (optional)
# - DEPLOY_PATH       : /opt/fingerback (optional)
# - TAILSCALE_AUTHKEY : Reusable ephemeral key (tanpa tag)
# - GHCR_PAT          : GitHub PAT read:packages (optional, public image)
# - GHCR_USERNAME     : GitHub username (optional)
